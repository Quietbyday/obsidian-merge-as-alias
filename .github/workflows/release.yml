name: Release Obsidian plugin

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload main.js
        uses: actions/upload-artifact@v4
        with:
          name: main.js
          path: main.js

      - name: Upload manifest.json
        uses: actions/upload-artifact@v4
        with:
          name: manifest.json
          path: manifest.json